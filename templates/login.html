<!DOCTYPE html>
<html>
<head>
    <title>Vastukalp Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3e2723, #5d4037);
        }

        .card {
            background: #f5ebe0;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            margin-bottom: 5px;
            color: #3e2723;
        }

        p {
            font-size: 13px;
            color: #6d4c41;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #d7ccc8;
            background: #fffaf5;
        }

        input:focus {
            outline: none;
            border-color: #8d6e63;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: #6d4c41;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        button:hover {
            background: #4e342e;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Vastukalp</h1>
    <p>Architecture & Project Management</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign In</button>
    </form>
</div>

</body>
</html>
