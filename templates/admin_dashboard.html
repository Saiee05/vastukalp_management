<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            background: #f5ebe0;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #3e2723;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
        }

        .sidebar a {
            display: block;
            color: #d7ccc8;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #5d4037;
            color: white;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 30px;
        }

        h1 {
            color: #3e2723;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            flex: 1;
            background: #fffaf5;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin: 0;
            font-size: 18px;
            color: #6d4c41;
        }

        .card p {
            font-size: 28px;
            margin: 10px 0 0;
            color: #3e2723;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>Vastukalp</h2>
    <a href="/admin_dashboard">Dashboard</a>
    <a href="/employees">Employees</a>
    <a href="/clients">Clients</a>
    <a href="/projects">Projects</a>
    <a href="/admin_notifications">Notifications</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
    <h1>Welcome Admin </h1>

    <div class="cards">
        <div class="card">
            <h2>Total Employees</h2>
            <p>{{ total_employees }}</p>
        </div>

        <div class="card">
            <h2>Total Clients</h2>
            <p>{{ total_clients }}</p>
        </div>

        <div class="card">
            <h2>Total Projects</h2>
            <p>{{ total_projects }}</p>
        </div>
    </div>
</div>

</body>
</html>
