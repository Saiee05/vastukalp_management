<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            background: #f5ebe0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #3e2723;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 5px;
        }

        .sidebar p {
            font-size: 12px;
            color: #d7ccc8;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #d7ccc8;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #5d4037;
            color: white;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
        }

        h1 {
            color: #3e2723;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #fffaf5;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin: 0;
            font-size: 28px;
            color: #6d4c41;
        }

        .card p {
            margin: 5px 0 0;
            color: #8d6e63;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>{{ session['name'] }}</h2>
    <p>Employee Panel</p>

    <a href="/employee_dashboard">Dashboard</a>
    <a href="/employee_projects">My Projects</a>
    <a href="/employee_notifications">Notifications</a>
    <a href="/logout">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h2>{{ total }}</h2>
            <p>Total Projects</p>
        </div>

        <div class="card">
            <h2>{{ not_started }}</h2>
            <p>Not Started</p>
        </div>

        <div class="card">
            <h2>{{ in_progress }}</h2>
            <p>In Progress</p>
        </div>

        <div class="card">
            <h2>{{ completed }}</h2>
            <p>Completed</p>
        </div>
    </div>
</div>

</body>
</html>
